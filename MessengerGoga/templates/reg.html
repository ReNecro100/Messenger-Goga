{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <title>Регистрация и вход</title>
</head>
<body>
    <div class="regbox">
        <div class="appname">Мессенджер Георгий</div>
        <form method="post">
            {% csrf_token %}
            {{ form }}
            <button type="submit" class="regbutton">Зарегестрироваться</button>
            <button type="submit" class="logbutton">Войти</button>
        </form>
    </div>
</body>
</html>
