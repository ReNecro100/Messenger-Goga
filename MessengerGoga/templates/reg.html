<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация и вход</title>
</head>
<body>
    {% if messages %}
    <ul class="messages" id="messages" style="position: absolute; top: 0; left: 0; background: red; color: white; z-index: 9999;">
        {% for message in messages %}
            <li class="{{ message.tags }}">
                {{ message }}
            </li>
        {% endfor %}
    </ul>
    {% endif %}
    <div class="regbox">
        <div class="appname">Мессенджер Георгий</div>
        <form method="post" autocomplete="off">
            {% csrf_token %}
            {{ form }}
            <button type="submit" name="reg">Зарегестрироваться</button>
            <button type="submit" name="log">Войти</button>
        </form>
    </div>
</body>

<script>

function hideDiv() {
  var divElement = document.getElementById("messages");
  if (divElement) {
    divElement.style.display = "none";
  }
}

// Call the hideDiv function after a 5-second delay
setTimeout(hideDiv, 3000);
</script>
