{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание нового чата</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    {% if messages %}
    <ul class="messages" id="messages" style="position: absolute; top: 0; left: 0; background: red; color: white; z-index: 9999;">
        {% for message in messages %}
            <li class="{{ message.tags }}">
                {{ message }}
            </li>
        {% endfor %}
    </ul>
    {% endif %}
    <div class="window">
        <div class="window-name"><img src="https://i.imgur.com/WLQXHbd.png"> Создай новый чат!</div>
        <input type="button" onclick="location.href='/wsschat/2';" value="Выйти" class="upright-button" />
        <div class="window-content">
            <form method="post" autocomplete="off">
                {% csrf_token %}
                {{ form }}
                <button type="submit" name="log">Создать!</button>
            </form>
        </div>
    </div>
</body>
</html>
