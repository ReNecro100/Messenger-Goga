services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  web:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - DEBUG=True
    command: uvicorn MessengerGoga.asgi:application --host 0.0.0.0 --port 8080

volumes:
  redis_data: